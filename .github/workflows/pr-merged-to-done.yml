name: PR mergeado → Issue para Done

on:
  pull_request:
    types: [closed]

jobs:
  move-to-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extrair número da issue pela branch do PR
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          ISSUE=$(echo "$BRANCH" | grep -oP '\d+' | head -1)
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT

      - name: Mover issue para Done no GitHub Projects
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue }}');
            if (!issueNumber) return;

            const query = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: ${issueNumber}) {
                    id
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2SingleSelectField { name id options { id name } } }
                              optionId
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const items = result.repository.issue.projectItems.nodes;
            for (const item of items) {
              for (const fv of item.fieldValues.nodes) {
                if (fv.field?.name === 'Status') {
                  const done = fv.field.options.find(o => o.name === 'Feito!');
                  if (!done) continue;
                  await github.graphql(`
                    mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $project, itemId: $item,
                        fieldId: $field, value: { singleSelectOptionId: $option }
                      }) { projectV2Item { id } }
                    }
                  `, {
                    project: item.project.id,
                    item: item.id,
                    field: fv.field.id,
                    option: done.id
                  });
                }
              }
            }
